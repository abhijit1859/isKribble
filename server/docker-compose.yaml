version: "3"

services:
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  redis-express:
    image: rediscommander/redis-commander
    container_name: redis-express
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis